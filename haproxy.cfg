global
    maxconn 12000
    nbthread 1
    hard-stop-after 1s
    tune.bufsize 8192
    tune.maxrewrite 1024

defaults
    mode http
    no log
    option dontlognull
    option http-keep-alive
    retries 0
    timeout connect 50ms
    timeout client 10s
    timeout server 10s
    timeout http-request 2s
    timeout http-keep-alive 60s
    timeout queue 50ms

frontend fraud_front
    bind *:9999 backlog 4096
    maxconn 12000
    default_backend fraud_api

backend fraud_api
    balance roundrobin
    http-reuse always
    default-server maxconn 6000
    server api1 unix@/sockets/api1.sock
    server api2 unix@/sockets/api2.sock
