worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nodelay on;
    tcp_nopush on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    upstream fraud_api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        # Note: upstream keepalive is intentionally OFF. monoio 0.2.4 has a
        # quiet bug where the second recv on a kept-alive AF_UNIX stream
        # never completes; using one-shot upstream connections avoids it. UDS
        # connect is ~10us, cheaper than the syscall-side cost of debugging
        # this any further.
    }

    server {
        listen 9999;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_pass http://fraud_api;
        }
    }
}
