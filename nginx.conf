worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

stream {
    upstream fraud_api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
    }

    server {
        listen 9999 reuseport backlog=4096;
        proxy_pass fraud_api;
        proxy_buffer_size 16k;
    }
}
