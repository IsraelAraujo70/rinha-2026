services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1:
    image: ghcr.io/israelaraujo70/rinha-2026:d195661
    platform: linux/amd64
    environment:
      SOCKET_PATH: /sockets/api1.sock
      INDEX_PATH: /index/data.bin
      IVF_NPROBE: "6"
      IVF_FULL_NPROBE: "64"
      KNN_TIMEOUT_US: "3000"
      RUST_LOG: warn
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    image: ghcr.io/israelaraujo70/rinha-2026:d195661
    platform: linux/amd64
    environment:
      SOCKET_PATH: /sockets/api2.sock
      INDEX_PATH: /index/data.bin
      IVF_NPROBE: "6"
      IVF_FULL_NPROBE: "64"
      KNN_TIMEOUT_US: "3000"
      RUST_LOG: warn
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

volumes:
  sockets:
