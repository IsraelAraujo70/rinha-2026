services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1:
    image: rinha-2026:latest
    platform: linux/amd64
    build: .
    environment:
      API_UDS_PATH: /sockets/api1.sock
      INDEX_PATH: /index/data.bin
      IVF_NPROBE: "8"
      IVF_FULL_NPROBE: "24"
      KNN_TIMEOUT_US: "3000"
      RUST_LOG: warn
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    image: rinha-2026:latest
    platform: linux/amd64
    build: .
    environment:
      API_UDS_PATH: /sockets/api2.sock
      INDEX_PATH: /index/data.bin
      IVF_NPROBE: "8"
      IVF_FULL_NPROBE: "24"
      KNN_TIMEOUT_US: "3000"
      RUST_LOG: warn
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

volumes:
  sockets:
